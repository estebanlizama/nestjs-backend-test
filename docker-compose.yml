services:
  # ─────────────────── PostgreSQL ───────────────────
  db:
    image: postgres:15-alpine
    container_name: tasks_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_tasks
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d test_tasks']
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────── NestJS API ───────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: tasks_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/test_tasks?schema=public
      PORT: 3001
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      NODE_ENV: development
    ports:
      - '3001:3001'
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: >
      sh -c "npx prisma generate && npx prisma db push && npm run start:dev"

volumes:
  postgres_data:
    driver: local
